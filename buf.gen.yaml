version: v1

plugins:
  # Generates .pb.go files (message structs)
  - plugin: buf.build/protocolbuffers/go
    out: gen
    opt:
      - paths=source_relative

  # Generates _grpc.pb.go files (server/client interfaces)
  - plugin: buf.build/grpc/go
    out: gen
    opt:
      - paths=source_relative
      - require_unimplemented_servers=false
